<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FlowPay">
  <defs>
    <linearGradient id="ico" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6F95B"/>
      <stop offset="100%" stop-color="#7DA614"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#000000"/>
